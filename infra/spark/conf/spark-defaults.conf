# Iceberg classloader 가 glob 패턴 (/opt/spark/extra-jars/*) 미지원 → 절대 경로 명시 (Deviation 9.1-C).
# spark.jars 는 콤마(,) 구분 (Hadoop FileSystem URI 로 resolve),
# extraClassPath 는 콜론(:) 구분 (JVM classpath). 형식 불일치 시 URISyntaxException 발생.
spark.jars                       /opt/spark/extra-jars/iceberg-spark-runtime-3.5_2.12-1.7.1.jar,/opt/spark/extra-jars/iceberg-aws-bundle-1.7.1.jar,/opt/spark/extra-jars/hadoop-aws-3.3.4.jar,/opt/spark/extra-jars/aws-java-sdk-bundle-1.12.262.jar
spark.driver.extraClassPath      /opt/spark/extra-jars/iceberg-spark-runtime-3.5_2.12-1.7.1.jar:/opt/spark/extra-jars/iceberg-aws-bundle-1.7.1.jar:/opt/spark/extra-jars/hadoop-aws-3.3.4.jar:/opt/spark/extra-jars/aws-java-sdk-bundle-1.12.262.jar
spark.executor.extraClassPath    /opt/spark/extra-jars/iceberg-spark-runtime-3.5_2.12-1.7.1.jar:/opt/spark/extra-jars/iceberg-aws-bundle-1.7.1.jar:/opt/spark/extra-jars/hadoop-aws-3.3.4.jar:/opt/spark/extra-jars/aws-java-sdk-bundle-1.12.262.jar

spark.sql.extensions             org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.ice            org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.ice.type       rest
spark.sql.catalog.ice.uri        http://lakekeeper:8181/catalog
# Deviation 9.1-A — Lakekeeper REST 는 warehouse 를 NAME 으로 lookup (S3 path 아님).
# SoT: infra/lakekeeper/bootstrap.py:16 WAREHOUSE_NAME = "seoul"
# SoT: src/flink_jobs/lib/iceberg_sink.py:13-15 동일 패턴.
spark.sql.catalog.ice.warehouse  seoul
spark.sql.catalog.ice.io-impl    org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.ice.s3.endpoint http://minio:9000
spark.sql.catalog.ice.s3.access-key-id minioadmin
spark.sql.catalog.ice.s3.secret-access-key minioadmin
spark.sql.catalog.ice.s3.path-style-access true

spark.sql.defaultCatalog         ice
spark.driver.memory              1g
spark.executor.memory            1g
